name: Build, Push, and Deploy to ECS

on:
  push:
    branches:
      - main
      - service-discover
    paths:
      - "rusinnextjs/**"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      skip_build:
        description: "Skip Docker Build & Push?"
        type: boolean
        required: true
        default: true

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: rusin-nextjs-app-repo-dev
  ECS_SERVICE: nextjs-app-service
  ECS_CLUSTER: ecs-cluster-dev
  ECS_TASK_DEFINITION: task-definition.json
  CONTAINER_NAME: nextjs_task_manager_app
  DOMAIN_NAME: devsandbox.space
  USER_POOL: nextjs-task-manager-pool

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.ACCOUNT_ID }}:role/GitHubActions-ECS-DeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ---------------------------------------------------------
      # NEW STEP: Dynamically Fetch Cognito Values via AWS CLI
      # ---------------------------------------------------------
      - name: Fetch Cognito Details
        id: fetch-cognito
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_build == true) }}
        run: |
          # 1. Get User Pool ID by finding the pool with your exact name
          # REPLACE 'YOUR_USER_POOL_NAME' with your actual pool name from Terraform!
          USER_POOL_NAME=${{ env.USER_POOL }}
          USER_POOL_ID=$(aws cognito-idp list-user-pools --max-results 60 --query "UserPools[?Name=='$USER_POOL_NAME'].Id" --output text)

          if [ -z "$USER_POOL_ID" ] || [ "$USER_POOL_ID" == "None" ]; then
            echo "Error: Could not find User Pool with name $USER_POOL_NAME"
            exit 1
          fi

          # 2. Get the first App Client ID attached to this User Pool
          CLIENT_ID=$(aws cognito-idp list-user-pool-clients --user-pool-id $USER_POOL_ID --max-results 10 --query "UserPoolClients[0].ClientId" --output text)

          # 3. Get the Domain Prefix to construct the full Cognito Domain URL
          DOMAIN_PREFIX=$(aws cognito-idp describe-user-pool --user-pool-id $USER_POOL_ID --query "UserPool.Domain" --output text)
          COGNITO_DOMAIN="https://${DOMAIN_PREFIX}.auth.${{ env.AWS_REGION }}.amazoncognito.com"

          echo "✅ Found Client ID: $CLIENT_ID"
          echo "✅ Found Domain: $COGNITO_DOMAIN"

          # 4. Save to GitHub Env so the Docker step can access them
          echo "NEXT_PUBLIC_COGNITO_CLIENT_ID=$CLIENT_ID" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_COGNITO_DOMAIN=$COGNITO_DOMAIN" >> $GITHUB_ENV

      # ---------------------------------------------------------
      # NEW STEP: Fetch Secrets securely
      # ---------------------------------------------------------
      #   - name: Fetch MongoDB URI from Secrets Manager
      #     id: fetch-secrets
      #     run: |
      #       # Fetch the secret string from AWS
      #       MONGO_URI=$(aws secretsmanager get-secret-value --secret-id /nextjs-task-manager/prod/mongodb-uri --query SecretString --output text)

      #       # CRITICAL: Mask the secret so it never prints in GitHub Action logs
      #       echo "::add-mask::$MONGO_URI"

      #       # Pass it as an output to the next step
      #       echo "MONGO_URI=$MONGO_URI" >> $GITHUB_OUTPUT

      # ---------------------------------------------------------
      # FIXED: Consolidated Build & Push
      # ---------------------------------------------------------

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_build == true) }}
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd rusinnextjs

          # Pass the dummy URI so the build bypasses the database connection
          docker build \
            --build-arg NEXT_PUBLIC_APP_URL=https://${{ env.DOMAIN_NAME }} \
            --build-arg MONGODB_URI=mongodb://build-time-dummy \
            --build-arg NEXT_PUBLIC_COGNITO_DOMAIN=${{ env.NEXT_PUBLIC_COGNITO_DOMAIN }} \
            --build-arg NEXT_PUBLIC_COGNITO_CLIENT_ID=${{ env.NEXT_PUBLIC_COGNITO_CLIENT_ID }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
            
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Determine Image URI (Fetch from ECR)
        id: determine-image
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.skip_build == true) }}
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO_NAME: ${{ env.ECR_REPOSITORY }}
        run: |
          # 1. If the user left the input as 'latest', dynamically fetch the most recent tag from ECR
          echo "🔍 Fetching the most recently pushed image tag from ECR for $REPO_NAME..."

          # AWS CLI command to get the latest pushed image tag
          FETCHED_TAG=$(aws ecr describe-images \
            --repository-name $REPO_NAME \
            --query 'sort_by(imageDetails,& imagePushedAt)[-1].imageTags[0]' \
            --output text)

          # Safety check: ensure we actually found a tag
          if [ "$FETCHED_TAG" == "None" ] || [ -z "$FETCHED_TAG" ]; then
            echo "❌ Error: Could not find any images in ECR repository $REPO_NAME"
            exit 1
          fi

          echo "✅ Found latest image tag: $FETCHED_TAG"
          echo "final_image=$ECR_REGISTRY/$REPO_NAME:$FETCHED_TAG" >> $GITHUB_OUTPUT

      # ---------------------------------------------------------
      # FIXED: Correct Task Definition Fetch
      # ---------------------------------------------------------
      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition nextjs-task-manager-app \
            --query taskDefinition > ${{ env.ECS_TASK_DEFINITION }}

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image || steps.determine-image.outputs.final_image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
